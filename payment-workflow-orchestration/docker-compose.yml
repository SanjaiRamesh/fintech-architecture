# Payment Workflow Orchestration — Full stack docker-compose
#
# Starts infrastructure (PostgreSQL, Kafka) + all 9 services in one network.
# Services talk to each other and to infra by container name — no host.docker.internal needed.
#
# First-time setup:
#   1. mvn clean package -DskipTests
#   2. docker-compose up --build
#
# Access the system via the API Gateway at http://localhost:9000

version: "3.8"

networks:
  payment-net:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:

services:

  # ── Infrastructure ─────────────────────────────────────────────────────────

  postgres:
    image: postgres:latest
    container_name: postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db-init.sql:/docker-entrypoint-initdb.d/db-init.sql
    networks:
      - payment-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: kafka-compose
    ports:
      - "9093:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - payment-net
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Application Services ───────────────────────────────────────────────────

  validation-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: validation-service/target/validation-service-1.0.0-SNAPSHOT.jar
    image: payment/validation-service:local
    container_name: validation-service
    ports:
      - "8081:8081"
    networks:
      - payment-net
    restart: unless-stopped

  risk-fraud-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: risk-fraud-service/target/risk-fraud-service-1.0.0-SNAPSHOT.jar
    image: payment/risk-fraud-service:local
    container_name: risk-fraud-service
    ports:
      - "8082:8082"
    environment:
      RISK_DB_URL:      jdbc:postgresql://postgres:5432/risk_fraud_db?TimeZone=UTC
      RISK_DB_USER:     payment_user
      RISK_DB_PASSWORD: payment_pass
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - payment-net
    restart: unless-stopped

  routing-engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: routing-engine/target/routing-engine-1.0.0-SNAPSHOT.jar
    image: payment/routing-engine:local
    container_name: routing-engine
    ports:
      - "8083:8083"
    environment:
      ROUTING_DB_URL:      jdbc:postgresql://postgres:5432/routing_db?TimeZone=UTC
      ROUTING_DB_USER:     payment_user
      ROUTING_DB_PASSWORD: payment_pass
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - payment-net
    restart: unless-stopped

  fx-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: fx-service/target/fx-service-1.0.0-SNAPSHOT.jar
    image: payment/fx-service:local
    container_name: fx-service
    ports:
      - "8084:8084"
    environment:
      FX_DB_URL:      jdbc:postgresql://postgres:5432/fx_db?TimeZone=UTC
      FX_DB_USER:     payment_user
      FX_DB_PASSWORD: payment_pass
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - payment-net
    restart: unless-stopped

  ledger-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: ledger-service/target/ledger-service-1.0.0-SNAPSHOT.jar
    image: payment/ledger-service:local
    container_name: ledger-service
    ports:
      - "8085:8085"
    environment:
      LEDGER_DB_URL:      jdbc:postgresql://postgres:5432/ledger_db?TimeZone=UTC
      LEDGER_DB_USER:     payment_user
      LEDGER_DB_PASSWORD: payment_pass
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - payment-net
    restart: unless-stopped

  provider-integration:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: provider-integration/target/provider-integration-1.0.0-SNAPSHOT.jar
    image: payment/provider-integration:local
    container_name: provider-integration
    ports:
      - "8086:8086"
    networks:
      - payment-net
    restart: unless-stopped

  payment-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: payment-orchestrator/target/payment-orchestrator-1.0.0-SNAPSHOT.jar
    image: payment/payment-orchestrator:local
    container_name: payment-orchestrator
    ports:
      - "8080:8080"
    environment:
      ORCHESTRATOR_DB_URL:      jdbc:postgresql://postgres:5432/payment_orchestrator_db?TimeZone=UTC
      ORCHESTRATOR_DB_USER:     payment_user
      ORCHESTRATOR_DB_PASSWORD: payment_pass
      KAFKA_BOOTSTRAP_SERVERS:  kafka:9092
      VALIDATION_SERVICE_URL:   http://validation-service:8081
      RISK_SERVICE_URL:         http://risk-fraud-service:8082
      ROUTING_SERVICE_URL:      http://routing-engine:8083
      FX_SERVICE_URL:           http://fx-service:8084
      LEDGER_SERVICE_URL:       http://ledger-service:8085
      PROVIDER_SERVICE_URL:     http://provider-integration:8086
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      validation-service:
        condition: service_started
      risk-fraud-service:
        condition: service_started
      routing-engine:
        condition: service_started
      fx-service:
        condition: service_started
      ledger-service:
        condition: service_started
      provider-integration:
        condition: service_started
    networks:
      - payment-net
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: notification-service/target/notification-service-1.0.0-SNAPSHOT.jar
    image: payment/notification-service:local
    container_name: notification-service
    ports:
      - "8087:8087"
    environment:
      NOTIFICATION_DB_URL:      jdbc:postgresql://postgres:5432/notification_db?TimeZone=UTC
      NOTIFICATION_DB_USER:     payment_user
      NOTIFICATION_DB_PASSWORD: payment_pass
      KAFKA_BOOTSTRAP_SERVERS:  kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - payment-net
    restart: unless-stopped

  reconciliation-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: reconciliation-service/target/reconciliation-service-1.0.0-SNAPSHOT.jar
    image: payment/reconciliation-service:local
    container_name: reconciliation-service
    ports:
      - "8088:8088"
    environment:
      RECONCILIATION_DB_URL:      jdbc:postgresql://postgres:5432/reconciliation_db?TimeZone=UTC
      RECONCILIATION_DB_USER:     payment_user
      RECONCILIATION_DB_PASSWORD: payment_pass
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - payment-net
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        JAR_FILE: api-gateway/target/api-gateway-1.0.0-SNAPSHOT.jar
    image: payment/api-gateway:local
    container_name: api-gateway
    ports:
      - "9000:9000"
    environment:
      PAYMENT_ORCHESTRATOR_URL:   http://payment-orchestrator:8080
      VALIDATION_SERVICE_URL:     http://validation-service:8081
      RISK_SERVICE_URL:           http://risk-fraud-service:8082
      ROUTING_SERVICE_URL:        http://routing-engine:8083
      FX_SERVICE_URL:             http://fx-service:8084
      LEDGER_SERVICE_URL:         http://ledger-service:8085
      PROVIDER_SERVICE_URL:       http://provider-integration:8086
      NOTIFICATION_SERVICE_URL:   http://notification-service:8087
      RECONCILIATION_SERVICE_URL: http://reconciliation-service:8088
    depends_on:
      - payment-orchestrator
    networks:
      - payment-net
    restart: unless-stopped
