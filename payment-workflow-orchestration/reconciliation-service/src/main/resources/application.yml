server:
  port: 8088

spring:
  application:
    name: reconciliation-service
  datasource:
    url: ${RECONCILIATION_DB_URL:jdbc:postgresql://localhost:5432/reconciliation_db}
    username: ${RECONCILIATION_DB_USER:payment_user}
    password: ${RECONCILIATION_DB_PASSWORD:payment_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.payment.reconciliation: DEBUG
