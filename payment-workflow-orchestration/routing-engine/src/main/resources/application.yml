server:
  port: 8083

spring:
  application:
    name: routing-engine
  datasource:
    url: ${ROUTING_DB_URL:jdbc:postgresql://localhost:5432/routing_db}
    username: ${ROUTING_DB_USER:payment_user}
    password: ${ROUTING_DB_PASSWORD:payment_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.payment.routing: DEBUG
